<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una pequeña aventura...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;600;700&display=swap');
        
        body { font-family: 'Quicksand', sans-serif; }
        .fuente-carta { font-family: 'Playfair Display', serif; }
        
        .bg-pastel-gray { background-color: #f3f4f6; }
        .bg-rosa-pastel { background-color: #ffd1dc; }
        
        /* Animación de nubes flotando */
        @keyframes floatClouds {
            0% { transform: translateX(-15%); }
            50% { transform: translateX(15%); }
            100% { transform: translateX(-15%); }
        }
        .nubes { animation: floatClouds 25s infinite ease-in-out; }

        /* Estilos para la lluvia de corazones */
        .heart {
            position: absolute;
            color: #ff6b81;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 100;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body id="cuerpo" class="bg-pastel-gray transition-colors duration-1000 min-h-screen flex flex-col justify-between p-4 relative overflow-x-hidden select-none">

    <div id="contenedor-corazones" class="absolute inset-0 pointer-events-none overflow-hidden z-50"></div>

    <div class="absolute inset-0 opacity-40 pointer-events-none z-0 overflow-hidden">
        <div class="nubes text-9xl text-white absolute top-5 left-5"><i class="fa-solid fa-cloud"></i></div>
        <div class="nubes text-8xl text-white absolute top-24 left-1/3" style="animation-delay: -3s;"><i class="fa-solid fa-cloud"></i></div>
        <div class="nubes text-9xl text-white absolute top-1/3 -right-5" style="animation-delay: -7s;"><i class="fa-solid fa-cloud"></i></div>
        <div class="nubes text-7xl text-white absolute bottom-20 left-10" style="animation-delay: -12s;"><i class="fa-solid fa-cloud"></i></div>
    </div>

    <div class="absolute top-4 left-4 text-xs text-gray-500 max-w-[150px] italic z-10 font-medium">
        "Las mejores aventuras empiezan con una simple pista."
    </div>

    <div id="woodstock" class="absolute top-4 right-4 text-xl text-yellow-400 opacity-0 transition-opacity duration-500 z-10">
        <i class="fa-solid fa-feather-pointed"></i> <i class="fa-solid fa-hourglass-half text-xs text-gray-400"></i>
    </div>

    <header class="w-full max-w-md mx-auto text-center mt-8 z-10">
        <div class="flex justify-center space-x-4 text-2xl text-gray-300">
            <i id="huella-1" class="fa-solid fa-paw transition-colors duration-500"></i>
            <i id="huella-2" class="fa-solid fa-paw transition-colors duration-500"></i>
            <i id="huella-3" class="fa-solid fa-paw transition-colors duration-500"></i>
            <i id="huella-4" class="fa-solid fa-paw transition-colors duration-500"></i>
            <i id="huella-5" class="fa-solid fa-paw transition-colors duration-500"></i>
        </div>
        <p id="contador-dias" class="text-sm text-gray-600 mt-2 font-semibold tracking-wide">Cargando aventura...</p>
    </header>

    <main class="w-full max-w-md mx-auto bg-white/80 backdrop-blur-sm rounded-3xl p-6 shadow-xl border border-white/50 my-auto z-10 relative">
        
        <div id="casita-silueta" class="absolute bottom-4 right-4 text-red-400 text-3xl opacity-0 transition-opacity duration-1000 pointer-events-none">
            <i class="fa-solid fa-house-chimney"></i>
        </div>

        <div id="lienzo-carta" class="text-center mb-6 p-5 bg-white/60 rounded-2xl min-h-[140px] flex flex-col justify-center items-center border border-dashed border-pink-200 shadow-inner">
            <p id="texto-carta" class="fuente-carta text-gray-400 italic text-lg font-medium leading-relaxed">
                El lienzo está en blanco... Resuelve el primer acertijo para darle vida.
            </p>
        </div>

        <div id="zona-acertijo" class="space-y-4">
            <div id="bloque-pregunta" class="flex items-start space-x-3 bg-pink-50/40 p-4 rounded-2xl border border-pink-100/70 shadow-sm">
                <span id="perrito-pensando" class="text-pink-400 text-xl pt-0.5 opacity-0 transition-opacity duration-500"><i class="fa-solid fa-paw"></i></span>
                <p id="texto-acertijo" class="text-gray-700 text-sm md:text-base whitespace-pre-line font-semibold leading-relaxed">
                    </p>
            </div>

            <div id="controles-juego" class="space-y-3">
                <input type="text" id="input-respuesta" placeholder="Escribe tu respuesta aquí..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 text-center font-semibold tracking-wide transition-all shadow-inner">
                <button onclick="verificarRespuesta()" class="w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 tracking-wide text-sm md:text-base">
                    Comenzar desafío 🐾
                </button>
            </div>
        </div>

        <p id="mensaje-felicitacion" class="text-center text-xs md:text-sm text-pink-500 font-bold mt-4 min-h-[20px] opacity-0 transition-opacity duration-300 tracking-wide"></p>
    </main>

    <footer onclick="reiniciarJuegoSecreto()" class="w-full text-center text-xs text-gray-400 pb-2 z-10 font-medium cursor-pointer hover:text-pink-400 transition-colors">
        Hecho con ❤️ para alguien muy especial
    </footer>

    <div id="pantalla-final" class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-1000 flex flex-col justify-center items-center z-50 text-white text-center p-6">
        <div id="contenedor-huellitas-final" class="flex space-x-4 text-3xl text-pink-400 mb-6 overflow-hidden w-48 justify-start">
            </div>
        <p id="texto-final-1" class="text-xl font-bold opacity-0 transition-opacity duration-1000">Has llegado al final del misterio...</p>
        <p id="texto-final-2" class="text-lg font-medium mt-2 text-pink-300 opacity-0 transition-opacity duration-1000">Pero en realidad, apenas comienza nuestra aventura.</p>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(tipo) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (tipo === 'acierto') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (tipo === 'error') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (tipo === 'final') {
                const notas = [523.25, 659.25, 783.99, 1046.50];
                notas.forEach((freq, index) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.15));
                    g.gain.setValueAtTime(0.2, audioCtx.currentTime + (index * 0.15));
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.15) + 0.5);
                    o.start(o.currentTime);
                    o.stop(audioCtx.currentTime + (index * 0.15) + 0.5);
                });
            }
        }

        function lluviaDeCorazones() {
            const contenedor = document.getElementById('contenedor-corazones');
            for (let i = 0; i < 35; i++) {
                setTimeout(() => {
                    const corazon = document.createElement('div');
                    corazon.classList.add('heart');
                    corazon.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
                    corazon.style.left = Math.random() * 100 + 'vw';
                    corazon.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    corazon.style.fontSize = (Math.random() * 15 + 15) + 'px';
                    contenedor.appendChild(corazon);
                    setTimeout(() => corazon.remove(), 4000);
                }, i * 80);
            }
        }

        const datosDias = {
            1: {
                acertijo: "No soy el rojo de un fuerte latido,\nni el blanco puro de una nube al pasar.\nSoy el color del amor más bonito,\nel que en tus mejillas suelo mirar.\n\nSi juntas las flores que tanto te alegran,\ny el dulce tono que tiene el amor,\nsabrás qué color vestirá este lienzo...\nDime, mi vida, ¿cuál es ese color?",
                respuestas: ["rosa", "rosa pastel", "rosado"],
                felicitacion: "¡Hola, mi amor! Lo estás haciendo muy bien. 💕 Has dado el primer paso para nuestra pequeña aventura juntos. Este lienzo apenas comienza a tomar color...",
                cartaHastaAqui: "Mi cielo, he preparado esto con mucha ilusión..."
            },
            2: {
                acertijo: "Si me lo dices, ya no existo;\nsi lo compartes, me pierdes al instante.\nVivo escondido en tu mente y tu pecho,\nguardando sorpresas de forma elegante.\n\nAunque hoy no sepas qué estoy ocultando,\nmuy pronto tus ojos lo van a ver...\nDime, mi cielo, ¿qué palabra guardo,\nque solo nosotros sabremos leer?",
                respuestas: ["secreto", "misterio"],
                felicitacion: "Muy bien mi amor, sigue así, hoy has desbloqueado las primeras palabras de mi mensaje secreto para ti, sigue así. 🐾✨",
                cartaHastaAqui: "Mi cielo, he preparado esto con mucha ilusión...<br>y me encantaría compartirlo contigo."
            },
            3: {
                acertijo: "Para saber qué día nos espera,\nla mirada al cielo tendrás que levantar.\nHay un gigante con anillos de oro,\nque en el sistema solar vas a encontrar.\n\nCuenta los pasos desde el gran Sol,\nbusca su sitio en esa gran fila...\nPon el número de su posición,\ny la fecha exacta se nos devela.",
                respuestas: ["6", "seis"],
                felicitacion: "Creo que empiezas a descubrir de qué es el mensaje, pero sigue así, mañana te espera una nueva pista pastelito. 🐾✨",
                cartaHastaAqui: "Mi cielo, he preparado esto con mucha ilusión...<br>y me encantaría compartirlo contigo el próximo sábado."
            },
            4: {
                acertijo: "Ni muy temprano en la mañana,\nni cuando la Luna empieza a reinar.\nBusca el momento exacto y perfecto\nen que el Sol la cima del cielo va a tocar.\n\nEn la astronomía tiene un gran nombre,\nel punto más alto, donde no hay doblez...\nInvestiga cómo se llama esa cumbre,\ny sabrás la hora en que te veré.",
                respuestas: ["cénit", "cenit", "mediodía", "medio dia"],
                felicitacion: "Excelente mi amor, ya casi estás a punto de descubrir toda la sorpresa. 🐾✨",
                cartaHastaAqui: "Mi cielo, he preparado esto con mucha ilusión...<br>y me encantaría compartirlo contigo el próximo sábado.<br>Tú y yo nos veremos al mediodía."
            },
            5: {
                acertijo: "Has llegado al final del camino,\npero el mapa aún tienes que descifrar.\nPara saber la calle de nuestro destino,\nuna última cuenta tendrás que lograr.\n\nPiensa en el cuarto de un siglo entero,\no multiplica cinco por cinco otra vez...\nPon en la barra ese número certero,\ny la ubicación por fin la sabrás.",
                respuestas: ["25"],
                felicitacion: "", 
                cartaHastaAqui: "Mi cielo, he preparado esto con mucha ilusión...<br>y me encantaría compartirlo contigo el próximo sábado.<br>Tú y yo nos veremos al mediodía.<br><br><b>Te espero en la 25 calle poniente mi amor, te quiero. ❤️</b>"
            }
        };

        let ultimoDiaRespondido = parseInt(localStorage.getItem('ultimoDiaFinalV3')) || 0;
        let marcaTiempoUltimoAcierto = parseInt(localStorage.getItem('marcaTiempoFinalV3')) || 0;
        let diaActual = ultimoDiaRespondido + 1;
        if(diaActual > 5) diaActual = 5;

        function cargarPagina() {
            const ahora = Date.now();
            // Bloqueo estricto de 23 horas reales
            const tiempoEspera = 23 * 60 * 60 * 1000; 

            // Pintar progreso de huellas
            for (let i = 1; i <= 5; i++) {
                const h = document.getElementById(`huella-${i}`);
                if (i <= ultimoDiaRespondido) {
                    h.classList.add('text-pink-500');
                    h.classList.remove('text-gray-300');
                } else {
                    h.classList.add('text-gray-300');
                    h.classList.remove('text-pink-500');
                }
            }

            // Fondo dinámico
            if (ultimoDiaRespondido >= 1) {
                document.getElementById('cuerpo').classList.remove('bg-pastel-gray');
                document.getElementById('cuerpo').classList.add('bg-rosa-pastel');
            } else {
                document.getElementById('cuerpo').classList.remove('bg-rosa-pastel');
                document.getElementById('cuerpo').classList.add('bg-pastel-gray');
            }

            // Texto de la carta acumulada
            const lienzo = document.getElementById('texto-carta');
            if (ultimoDiaRespondido > 0) {
                lienzo.innerHTML = datosDias[ultimoDiaRespondido].cartaHastaAqui;
                lienzo.classList.remove('text-gray-400', 'italic');
                lienzo.classList.add('text-gray-800');
            } else {
                lienzo.innerHTML = "El lienzo está en blanco... Resuelve el primer acertijo para darle vida.";
                lienzo.classList.add('text-gray-400', 'italic');
                lienzo.classList.remove('text-gray-800');
            }

            // Pistas visuales
            if (ultimoDiaRespondido >= 2) document.getElementById('perrito-pensando').classList.remove('opacity-0');
            else document.getElementById('perrito-pensando').classList.add('opacity-0');
            
            if (ultimoDiaRespondido >= 3) document.getElementById('woodstock').classList.remove('opacity-0');
            else document.getElementById('woodstock').classList.add('opacity-0');
            
            if (ultimoDiaRespondido >= 4) document.getElementById('casita-silueta').classList.remove('opacity-0');
            else document.getElementById('casita-silueta').classList.add('opacity-0');

            // CONTROL DE BLOQUEO: Solo si ya respondió hoy un día que estaba bloqueado
            if (ultimoDiaRespondido > 0 && ultimoDiaRespondido < 5 && (ahora - marcaTiempoUltimoAcierto < tiempoEspera)) {
                document.getElementById('contador-dias').innerText = `Día ${ultimoDiaRespondido} completado`;
                document.getElementById('texto-acertijo').innerText = "¡Ya resolviste el misterio de hoy, pastelito! 🌸\n\nTu progreso se ha guardado a salvo. Descansa y vuelve mañana para descubrir la siguiente pista. 🐾";
                document.getElementById('controles-juego').classList.add('hidden');
                
                const msg = document.getElementById('mensaje-felicitacion');
                msg.innerText = datosDias[ultimoDiaRespondido].felicitacion;
                msg.classList.remove('opacity-0');
                return;
            }

            // Si ya terminó todo el juego
            if (ultimoDiaRespondido === 5) {
                document.getElementById('contador-dias').innerText = `¡Aventura completada! ❤️`;
                document.getElementById('texto-acertijo').innerText = "Has descifrado todo el mensaje.";
                document.getElementById('zona-acertijo').innerHTML = `
                    <button onclick="alert('¡Siii! Cita confirmada. Nos vemos el sábado mi amor! 🐾❤️')" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-105 active:scale-95 text-lg">
                        ¡Sí, acepto! 🐾
                    </button>
                `;
                return;
            }

            // Habilitar siguiente día disponible
            diaActual = ultimoDiaRespondido + 1;
            document.getElementById('contador-dias').innerText = `Día ${diaActual} de 5`;
            document.getElementById('texto-acertijo').innerText = datosDias[diaActual].acertijo;
            document.getElementById('input-respuesta').value = "";
            document.getElementById('controles-juego').classList.remove('hidden');
            document.getElementById('mensaje-felicitacion').classList.add('opacity-0');
        }

        function verificarRespuesta() {
            const respuestaUsuario = document.getElementById('input-respuesta').value.trim().toLowerCase();
            const diaConfig = datosDias[diaActual];

            if (diaConfig.respuestas.includes(respuestaUsuario)) {
                playSound('acierto');
                lluviaDeCorazones();

                localStorage.setItem('ultimoDiaFinalV3', diaActual);
                localStorage.setItem('marcaTiempoFinalV3', Date.now());
                ultimoDiaRespondido = diaActual;
                marcaTiempoUltimoAcierto = Date.now();

                const lienzo = document.getElementById('texto-carta');
                lienzo.innerHTML = diaConfig.cartaHastaAqui;
                lienzo.classList.remove('text-gray-400', 'italic');
                lienzo.classList.add('text-gray-800');

                const msg = document.getElementById('mensaje-felicitacion');
                if(diaConfig.felicitacion !== "") {
                    msg.innerText = diaConfig.felicitacion;
                    msg.classList.remove('opacity-0');
                }

                if (diaActual < 5) {
                    setTimeout(() => {
                        cargarPagina();
                    }, 4000);
                } else {
                    setTimeout(ejecutarGranFinal, 2000);
                }
            } else {
                playSound('error');
                alert("¡Casi, mi amor! Inténtalo de nuevo, tú puedes. 💕");
            }
        }

        function ejecutarGranFinal() {
            playSound('final');
            const pantalla = document.getElementById('pantalla-final');
            pantalla.classList.remove('pointer-events-none', 'opacity-0');
            pantalla.classList.add('opacity-95');

            const contenedorHuellas = document.getElementById('contenedor-huellitas-final');
            contenedorHuellas.innerHTML = "";
            let j = 0;
            const intervaloHuellas = setInterval(() => {
                if(j < 4) {
                    contenedorHuellas.innerHTML += '<i class="fa-solid fa-paw animate-pulse"></i> ';
                    j++;
                } else {
                    clearInterval(intervaloHuellas);
                }
            }, 400);

            setTimeout(() => { document.getElementById('texto-final-1').classList.remove('opacity-0'); }, 1500);
            setTimeout(() => { document.getElementById('texto-final-2').classList.remove('opacity-0'); }, 3500);

            setTimeout(() => {
                pantalla.classList.add('opacity-0', 'pointer-events-none');
                cargarPagina();
            }, 6500);
        }

        function reiniciarJuegoSecreto() {
            localStorage.clear();
            ultimoDiaRespondido = 0;
            marcaTiempoUltimoAcierto = 0;
            diaActual = 1;
            location.reload();
        }

        window.onload = cargarPagina;
    </script>
</body>
</html>
